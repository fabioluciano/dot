[tools]
# Runtimes pinned to major version for reproducibility; utilities float at latest.
# Pinned on 2026-06-20 — bump each runtime's major when upgrading intentionally.
go = "1.26"
java = "26"
node = "26"
ruby = "4"
groovy = "5"
python = "3.14"
bun = "1"
deno = "2"

# Infrastructure & build utilities (float at latest)
terraform = "latest"
terragrunt = "latest"
maven = "latest"
bazel = "latest"
kubectl = "latest"
kubeconform = "latest"
terraform-ls = "latest"

# CLI tools (float at latest)
yq = "latest"
pandoc = "latest"
uv = "latest"
usage = "latest"
pre-commit = "latest"

# Node/Python tooling (moved off Homebrew so mise owns the versions)
pnpm = "latest"
"pipx:poetry" = "latest"    # pipx backend: vfox-poetry plugin is flaky
pipx = "latest"             # note: `uv tool` / `uvx` already cover this
"npm:typescript" = "latest"

[settings]
# Enable version files for better compatibility
idiomatic_version_file_enable_tools = ["node", "python", "ruby", "java"]
experimental = true
verbose = false
asdf_compat = false
jobs = 4

[env]
# Global environment variables
_.python.venv = { path = ".venv", create = true }

[tasks.update]
run = "mise self-update && mise upgrade"
description = "Update mise and all tools"

[tasks.doctor]
run = "mise doctor"
description = "Run mise doctor"

[plugins]
# Add any custom plugins here
