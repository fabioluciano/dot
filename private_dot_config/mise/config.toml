[tools]
# Runtimes pinned to major version for reproducibility; utilities float at latest.
# Pinned on 2026-06-20 — bump each runtime's major when upgrading intentionally.
go = "1.26"
java = "26"
node = "26"
ruby = "3.4"
groovy = "5"
python = "3.14"
bun = "1"
deno = "2"
rust = "latest"

# Infrastructure & build utilities (float at latest)
terraform = "latest"
terragrunt = "latest"
maven = "latest"
bazel = "latest"
kubectl = "latest"
kubeconform = "latest"
terraform-ls = "latest"

# CLI tools (float at latest)
yq = "latest"
pandoc = "latest"
uv = "latest"
usage = "latest"
pre-commit = "latest"

# Node/Python tooling (moved off Homebrew so mise owns the versions)
pnpm = "latest"
"pipx:poetry" = "latest"    # pipx backend: vfox-poetry plugin is flaky
pipx = "latest"             # note: `uv tool` / `uvx` already cover this
"npm:typescript" = "latest"

# Language servers / editor tooling (float at latest)
"npm:typescript-language-server" = "latest"
"npm:vscode-langservers-extracted" = "latest"
"go:golang.org/x/tools/gopls" = "latest"
rust-analyzer = "latest"
lua-language-server = "latest"
"npm:yaml-language-server" = "latest"
"npm:bash-language-server" = "latest"
"npm:@biomejs/biome" = "latest"
"npm:basedpyright" = "latest"
"aqua:tamasfe/taplo" = "latest"
"npm:dockerfile-language-server-nodejs" = "latest"
"npm:intelephense" = "latest"
"npm:oxlint" = "latest"
"aqua:Myriad-Dreamin/tinymist" = "latest"
"aqua:astral-sh/ruff" = "latest"
"aqua:zigtools/zls" = "latest"
"aqua:elixir-lsp/elixir-ls" = "latest"
"aqua:artempyanykh/marksman" = "latest"

stylua = "latest"
"pipx:debugpy" = "latest"
gofumpt = "latest"
"go:golang.org/x/tools/cmd/goimports" = "latest"
golangci-lint = "latest"
"go:github.com/go-delve/delve/cmd/dlv" = "latest"
"npm:@angular/language-server" = "latest"
"npm:@vue/language-server" = "latest"
"npm:@tailwindcss/language-server" = "latest"
yamllint = "latest"
yamlfmt = "latest"
shfmt = "latest"
"npm:@microsoft/compose-language-service" = "latest"
tflint = "latest"
"npm:sql-language-server" = "latest"
helm-ls = "latest"
"npm:markdownlint-cli" = "latest"
"npm:@mdx-js/language-server" = "latest"
"pipx:cmake-language-server" = "latest"
"pipx:cmakelint" = "latest"
"npm:tree-sitter-cli" = "latest"

[settings]
# Enable version files for better compatibility
idiomatic_version_file_enable_tools = ["node", "python", "ruby", "java"]
experimental = true
verbose = false
asdf_compat = false
jobs = 4

[env]
# Global environment variables
_.python.venv = { path = ".venv", create = true }

[tasks.update]
run = "mise self-update && mise upgrade"
description = "Update mise and all tools"

[tasks.update-safe]
run = "topgrade"
description = "Safe host/package-manager update path"

[tasks.update-dotfiles]
run = "chezmoi update --apply"
description = "Update dotfiles source and apply rendered changes"

[tasks.update-krew]
run = "kubectl krew upgrade"
description = "Upgrade kubectl plugins managed by Krew"

[tasks.update-nvim]
run = "nvim --headless '+Lazy! sync' +qa"
description = "Sync Neovim plugins headlessly"

[tasks.update-tmux]
run = "~/.tmux/plugins/tpm/bin/update_plugins all"
description = "Update tmux TPM plugins"

[tasks.update-full]
run = "mise run update-safe && mise run update-dotfiles && mise run update-krew && mise run update-nvim && mise run update-tmux"
description = "Full update path including dotfiles, kubectl plugins, Neovim, and tmux"

[tasks.doctor-chezmoi]
run = "chezmoi doctor && chezmoi --dry-run apply"
description = "Check chezmoi integrity and pending changes"

[tasks.doctor-opencode]
run = "cat ${HOME}/.config/opencode/.active_provider && chezmoi execute-template < private_dot_config/opencode/oh-my-openagent.jsonc.tmpl > /dev/null && echo opencode-ok"
description = "Verify opencode provider state and template render"

[tasks.doctor-nvim]
run = "nvim --headless +qa"
description = "Verify Neovim headless startup"

[tasks.doctor-all]
run = "mise run doctor-chezmoi && mise run doctor-opencode && mise run doctor-nvim"
description = "Full environment health check"

[tasks.doctor]
run = "mise doctor"
description = "Run mise doctor"

[tasks.skills-list]
run = "mise exec -- skills list"
description = "List installed skills via mise"

[tasks.skills-find]
run = "mise exec -- skills find {{vars.query}}"
description = "Find skills by query"
vars = { query = "" }

[tasks.skills-add]
run = "mise exec -- skills add {{vars.repo}} -a opencode -g -y"
description = "Add a skill repo via mise"
vars = { repo = "" }

[tasks.skills-update]
run = "mise exec -- skills update -g"
description = "Update all global skills via mise"

[tasks.skills-remove]
run = "mise exec -- skills remove {{vars.skill}} -a opencode"
description = "Remove a skill via mise"
vars = { skill = "" }

[plugins]
# Add any custom plugins here
