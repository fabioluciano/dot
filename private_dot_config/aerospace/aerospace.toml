# AeroSpace configuration
# Docs: https://nikitabobko.github.io/AeroSpace/guide
#
# Tuned to feel close to Amethyst: new windows auto-tile, and everything is
# keyboard-driven. Main modifier is Option (alt), like Amethyst's mod1.

# Start AeroSpace at login.
start-at-login = true

# Normalizations (keep the tree tidy, like an auto-tiler).
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# New windows tile automatically (Amethyst-like), splitting along the longer side.
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus when monitor changes.
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Don't fight with macOS hide; unhide apps when focused.
automatically-unhide-macos-hidden-apps = true

# Gaps between windows and screen edges (Amethyst-style breathing room).
[gaps]
inner.horizontal = 8
inner.vertical   = 8
outer.left       = 8
outer.bottom     = 8
outer.top        = 8
outer.right      = 8

# =============================================================================
# Main mode bindings (Option = alt). Amethyst's mod1 was Option+Shift; AeroSpace
# uses Option here for fewer chords. Change `alt` to `alt-shift` to match exactly.
# =============================================================================
[mode.main.binding]

# Layouts ---------------------------------------------------------------------
alt-slash = 'layout tiles horizontal vertical'   # toggle tiling orientation
alt-comma = 'layout accordion horizontal vertical' # accordion (stacked)
alt-space = 'layout floating tiling'              # toggle float for focused window

# Focus (Amethyst j/k, plus vim h/l) ------------------------------------------
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move window within the tree -------------------------------------------------
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize (Amethyst h/l shrink/expand main) ------------------------------------
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Promote focused window to "main"/first slot ---------------------------------
alt-enter = 'move-node-to-workspace --wrap-around next'

# Fullscreen ------------------------------------------------------------------
alt-f = 'fullscreen'

# Reload config after edits ---------------------------------------------------
alt-shift-c = 'reload-config'

# Workspaces (i3-style; AeroSpace uses its own, not macOS Spaces) --------------
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move focused window to workspace --------------------------------------------
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Quick toggle between the two most recent workspaces -------------------------
alt-tab = 'workspace-back-and-forth'

# Multi-monitor (Amethyst w/e/r focus screens) --------------------------------
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Service mode: alt-shift-semicolon, then a key (esc to exit) ------------------
alt-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']    # reset layout flat
f = ['layout floating tiling', 'mode main']    # toggle floating
backspace = ['close-all-windows-but-current', 'mode main']
