[opencode]
# Default provider (overridden by OPENCODE_PROVIDER env var at template time)
default_provider = "bedrock"

[opencode.tiers.bedrock]
pro  = "amazon-bedrock/anthropic.claude-opus-4-8"
fast = "amazon-bedrock/anthropic.claude-sonnet-4-6"

[opencode.tiers.anthropic]
pro  = "anthropic/claude-opus-4"
fast = "anthropic/claude-sonnet-4"

[opencode.tiers.xiaomi]
pro  = "xiaomi/mimo-v2.5-pro"
fast = "xiaomi/mimo-v2.5"

# Map each agent to a tier ("pro" or "fast")
[opencode.agent_tiers]
# Pro tier agents (complex reasoning, planning, architecture)
sisyphus          = "pro"
hephaestus        = "pro"
oracle            = "pro"
prometheus        = "pro"
metis             = "pro"
momus             = "pro"
# Fast tier agents (exploration, orchestration, simple tasks)
librarian         = "fast"
explore           = "fast"
multimodal-looker = "fast"
atlas             = "fast"
sisyphus-junior   = "fast"

# Map each category to a tier ("pro" or "fast")
[opencode.category_tiers]
# Pro tier categories
ultrabrain         = "pro"
deep               = "pro"
unspecified-high   = "pro"
# Fast tier categories
visual-engineering = "fast"
artistry           = "fast"
quick              = "fast"
unspecified-low    = "fast"
writing            = "fast"
