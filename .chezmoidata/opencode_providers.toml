# bedrock-mixed: cadeia non-Anthropic do Bedrock, validada via Converse API
# (us-east-1, 2026-06). Regras aplicadas:
#  - us.deepseek.r1-v1:0 REMOVIDO de tudo: nao suporta tool use
#    (ValidationException "This model doesn't support tool use").
#  - moonshot.kimi-k2-thinking (8.8s) e qwen.qwen3-vl-235b-a22b (14.8s)
#    nunca como primary: reasoning verboso/lento que trava loop de agente.
#  - primary de cada tier = modelo rapido (1-2s) e tool-capable; fallbacks validos.
[opencode.models.bedrock-mixed]
orchestrator = [
  "amazon-bedrock/zai.glm-5",
  "amazon-bedrock/minimax.minimax-m2.5",
  "amazon-bedrock/moonshotai.kimi-k2.5",
]
